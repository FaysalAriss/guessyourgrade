<!DOCTYPE html>
<html>
    <head>
        <title>Grade Roulette popup</title>
        <link rel="stylesheet" href="popup.css">
        <script type="module" src="popup.js"></script>
    </head>
    <body>
        <fieldset>
            <legend>Letter grades:</legend>

            <div>
                <label class="label">Possible grades from lowest to highest, seperated by a comma:</label>
                <input type="text" id="letter-grade-input" placeholder="F, D, C-, C, C+, B-, B, B+, A-, A, A+", value="F, D, C-, C, C+, B-, B, B+, A-, A, A+">
            </div>
            <br>
            <label class="label">Header title:</label>
            <div class="row">
                <input type="text" id="letter-grade-header" placeholder="Percentage Grades" value="Percentage Grades">
                <div class="checkbox-input">
                    <input type="checkbox" id="letter-grade-checkbox" checked>
                    <label class="label">Match whole word</label>
                </div>
            </div>
            <br>
            <div>
                <button id="letter-grade-reset">Reset</button>
                <button id="letter-grade-save">Save</button>
            </div>
        </fieldset>
        
        <fieldset>
            <legend>Number grades:</legend>
            <div class="row">
                <div class="label-input">
                    <label class="label">Minimum:</label>
                    <input id="number-grade-minimum" type="number" placeholder="minimum grade" value="0">
                </div>
                <div class="label-input">
                    <label class="label">Maximum:</label>
                    <input id="number-grade-maximum" type="number" placeholder="maximum grade" value="100">
                </div>
                <div class="label-input">
                    <label class="label">Resolution:</label>
                    <input id="number-grade-resolution" type="number" placeholder="resolution" value="1">
                </div>
            </div>
            <br>
            <label class="label">Header title:</label>
            <div class="row">
                <input type="text" id="number-grade-header" placeholder="Grade" value="Grade">
                <div class="checkbox-input">
                    <input type="checkbox" id="number-grade-checkbox">
                    <label class="label">Match whole word</label>
                </div> 
            </div>
            <br>
            <div>
                <button id="number-grade-reset">Reset</button>
                <button id="number-grade-save">Save</button>
            </div>
        </fieldset>
    </body>
</html>
